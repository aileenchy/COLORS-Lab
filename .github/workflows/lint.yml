name: Lint Code

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint (JS)
        run: npx eslint .

      - name: Run Stylelint (CSS)
        run: npx stylelint "**/*.css"

      - name: Run HTMLHint (HTML)
        run: npx htmlhint "**/*.html"